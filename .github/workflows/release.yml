name: Release

on:
  push:
    branches:
      - release

concurrency: ${{ github.workflow }}-${{ github.ref }}

env:
  REGISTRY: ghcr.io
  # We'll use the repository owner/name as the base image path.
  # Adjust if you want a specific org or repo name format.
  IMAGE_BASE: ghcr.io/${{ github.repository }}

jobs:
  release:
    name: Release Changeset
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    outputs:
      published: ${{ steps.changesets.outputs.published }}
      publishedPackages: ${{ steps.changesets.outputs.publishedPackages }}
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install Dependencies
        run: pnpm install

      - name: Create Release Pull Request
        id: changesets
        uses: changesets/action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          # This runs `pnpm run release` which maps to `changeset publish`
          publish: pnpm run release

  publish-docker:
    name: Publish Docker Images
    runs-on: ubuntu-latest
    needs: release
    if: needs.release.outputs.published == 'true'
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        package: ${{ fromJson(needs.release.outputs.publishedPackages) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare Docker Metadata
        id: prep
        run: |
            PACKAGE_NAME="${{ matrix.package.name }}"
            # Remove scope if present (e.g. @uptimekit/dash -> dash)
            APP_NAME=${PACKAGE_NAME#@*/}
            APP_NAME=${APP_NAME#*/}
            
            # Construct image name
            IMAGE_NAME=${{ env.REGISTRY }}/${{ github.repository_owner }}/uptimekit-${APP_NAME}
            # Lowercase just in case
            IMAGE_NAME=$(echo "$IMAGE_NAME" | tr '[:upper:]' '[:lower:]')
            
            echo "image_name=$IMAGE_NAME" >> $GITHUB_OUTPUT
            echo "app_name_clean=$APP_NAME" >> $GITHUB_OUTPUT
            
            # Find directory - assumes standard structure apps/[name]
            # We can try to find it via package.json location but that info isn't in matrix.package
            # So we rely on convention or search
            APP_DIR="apps/$APP_NAME"
            if [ ! -d "$APP_DIR" ]; then
                echo "Directory $APP_DIR does not exist, searching..."
                APP_DIR=$(find apps -name "package.json" -print0 | xargs -0 grep -l "\"name\": \"$PACKAGE_NAME\"" | xargs dirname)
            fi
            
            echo "app_dir=$APP_DIR" >> $GITHUB_OUTPUT

            if [ -z "$APP_DIR" ] || [ ! -f "$APP_DIR/Dockerfile" ]; then
                echo "skip=true" >> $GITHUB_OUTPUT
            else
                echo "skip=false" >> $GITHUB_OUTPUT
            fi

      - name: Docker meta
        id: meta
        if: steps.prep.outputs.skip != 'true'
        uses: docker/metadata-action@v5
        with:
          images: |
            ${{ steps.prep.outputs.image_name }}
            ${{ secrets.DOCKER_USERNAME }}/uptimekit-${{ steps.prep.outputs.app_name_clean }}
          tags: |
            type=semver,pattern={{version}},value=${{ matrix.package.version }}
            type=semver,pattern={{major}}.{{minor}},value=${{ matrix.package.version }}
            type=semver,pattern={{major}},value=${{ matrix.package.version }}

      - name: Set up QEMU
        if: steps.prep.outputs.skip != 'true'
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        if: steps.prep.outputs.skip != 'true'
        uses: docker/setup-buildx-action@v3

      - name: Docker Login to GHCR
        if: steps.prep.outputs.skip != 'true'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker Login to Docker Hub
        if: steps.prep.outputs.skip != 'true'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Docker Image Publish
        if: steps.prep.outputs.skip != 'true'
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ${{ steps.prep.outputs.app_dir }}/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  sync-development:
    name: Sync Release to Development
    needs: release
    if: needs.release.outputs.published == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Development
        uses: actions/checkout@v4
        with:
          ref: development
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Git Identity
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'

      - name: Merge Release into Development
        run: |
          git fetch origin release
          git merge origin/release
          git push origin development
