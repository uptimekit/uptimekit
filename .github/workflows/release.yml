name: Release

on:
  push:
    branches:
      - release

concurrency: ${{ github.workflow }}-${{ github.ref }}

env:
  REGISTRY: ghcr.io
  # We'll use the repository owner/name as the base image path.
  # Adjust if you want a specific org or repo name format.
  IMAGE_BASE: ghcr.io/${{ github.repository }}

jobs:
  release:
    name: Release Changeset
    runs-on: blacksmith-4vcpu-ubuntu-2404
    permissions:
      contents: write
      pull-requests: write
    outputs:
      published: ${{ steps.changesets.outputs.published }}
      publishedPackages: ${{ steps.combine_packages.outputs.result }}
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install Dependencies
        run: pnpm install

      - name: Create Release Pull Request
        id: changesets
        uses: changesets/action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          # This runs `pnpm run release` which maps to `changeset publish`
          publish: pnpm run release

      - name: Detect Private Package Changes
        id: private_changes
        run: |
          # Fetch depth needed for diff
          git fetch --depth=2 origin ${{ github.ref_name }}
          NODE_OUTPUT=$(node scripts/detect-changed-apps.cjs)
          echo "detected=$NODE_OUTPUT" >> $GITHUB_OUTPUT

      - name: Combine Packages
        id: combine_packages
        run: |
          PUBLISHED='${{ steps.changesets.outputs.publishedPackages }}'
          DETECTED='${{ steps.private_changes.outputs.detected }}'
          HAS_CHANGESETS='${{ steps.changesets.outputs.hasChangesets }}'
          IS_PUBLISHED='${{ steps.changesets.outputs.published }}'

          if [ "$HAS_CHANGESETS" == "true" ] && [ "$IS_PUBLISHED" != "true" ]; then
            echo "Versioning phase detected (PR creation). Skipping docker build."
            echo "result=[]" >> $GITHUB_OUTPUT
            exit 0
          fi
          
          # Handle empty/null inputs
          if [ -z "$PUBLISHED" ] || [ "$PUBLISHED" == "null" ]; then PUBLISHED="[]"; fi
          if [ -z "$DETECTED" ] || [ "$DETECTED" == "null" ]; then DETECTED="[]"; fi
          
          # Combine arrays using jq (available on ubuntu-latest)
          # We prefer detected (which grabs generic package.json changes)
          # but we merge them just in case. 
          # Note: detect-changed-apps.js returns {name, version}, same as changesets
          
          COMBINED=$(echo "$PUBLISHED" | jq --argjson detected "$DETECTED" -c '. + $detected | unique_by(.name)')
          
          echo "result=$COMBINED" >> $GITHUB_OUTPUT

  publish-docker:
    name: Publish Docker Images
    runs-on: blacksmith-4vcpu-ubuntu-2404
    needs: release
    if: needs.release.outputs.publishedPackages != '[]' && needs.release.outputs.publishedPackages != ''
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        package: ${{ fromJson(needs.release.outputs.publishedPackages) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare Docker Metadata
        id: prep
        run: |
            PACKAGE_NAME="${{ matrix.package.name }}"
            # Remove scope if present (e.g. @uptimekit/dash -> dash)
            APP_NAME=${PACKAGE_NAME#@*/}
            APP_NAME=${APP_NAME#*/}
            
            # Construct image name
            IMAGE_NAME=${{ env.REGISTRY }}/${{ github.repository_owner }}/uptimekit-${APP_NAME}
            # Lowercase just in case
            IMAGE_NAME=$(echo "$IMAGE_NAME" | tr '[:upper:]' '[:lower:]')
            
            echo "image_name=$IMAGE_NAME" >> $GITHUB_OUTPUT
            echo "app_name_clean=$APP_NAME" >> $GITHUB_OUTPUT
            
            # Find directory - assumes standard structure apps/[name]
            # We can try to find it via package.json location but that info isn't in matrix.package
            # So we rely on convention or search
            APP_DIR="apps/$APP_NAME"
            if [ ! -d "$APP_DIR" ]; then
                echo "Directory $APP_DIR does not exist, searching..."
                APP_DIR=$(find apps -name "package.json" -print0 | xargs -0 grep -l "\"name\": \"$PACKAGE_NAME\"" | xargs dirname)
            fi
            
            echo "app_dir=$APP_DIR" >> $GITHUB_OUTPUT

            if [ -z "$APP_DIR" ] || [ ! -f "$APP_DIR/Dockerfile" ]; then
                echo "skip=true" >> $GITHUB_OUTPUT
            else
                echo "skip=false" >> $GITHUB_OUTPUT
            fi

      - name: Docker meta
        id: meta
        if: steps.prep.outputs.skip != 'true'
        uses: docker/metadata-action@v5
        with:
          images: |
            ${{ steps.prep.outputs.image_name }}
            ${{ secrets.DOCKER_USERNAME }}/uptimekit-${{ steps.prep.outputs.app_name_clean }}
          tags: |
            type=semver,pattern={{version}},value=${{ matrix.package.version }}
            type=semver,pattern={{major}}.{{minor}},value=${{ matrix.package.version }}
            type=semver,pattern={{major}},value=${{ matrix.package.version }}

      - name: Set up QEMU
        if: steps.prep.outputs.skip != 'true'
        uses: docker/setup-qemu-action@v3

        if: steps.prep.outputs.skip != 'true'
      - name: Setup Blacksmith Builder
        uses: useblacksmith/setup-docker-builder@v1

      - name: Docker Login to GHCR
        if: steps.prep.outputs.skip != 'true'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker Login to Docker Hub
        if: steps.prep.outputs.skip != 'true'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Docker Image Publish
        if: steps.prep.outputs.skip != 'true'
        uses: useblacksmith/build-push-action@v2
        with:
          context: .
          file: ${{ steps.prep.outputs.app_dir }}/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  sync-development:
    name: Sync Release to Development
    needs: release
    if: needs.release.outputs.publishedPackages != '[]' && needs.release.outputs.publishedPackages != ''
    runs-on: blacksmith-4vcpu-ubuntu-2404
    permissions:
      contents: write
    steps:
      - name: Checkout Development
        uses: actions/checkout@v4
        with:
          ref: development
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Git Identity
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'

      - name: Merge Release into Development
        run: |
          git fetch origin release
          git merge origin/release
          git push origin development
