name: Release

on:
  push:
    branches:
      - release

concurrency: ${{ github.workflow }}-${{ github.ref }}

env:
  REGISTRY: ghcr.io
  IMAGE_BASE: ghcr.io/${{ github.repository }}

jobs:
  detect-releases:
    name: Detect Released Packages
    runs-on: blacksmith-4vcpu-ubuntu-2404
    permissions:
      contents: read
    outputs:
      packages: ${{ steps.detect.outputs.packages }}
      has_releases: ${{ steps.detect.outputs.has_releases }}
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Detect Changed Packages
        id: detect
        run: |
          # Get changed package.json files in the last commit (the merge commit)
          CHANGED_FILES=$(git diff --name-only HEAD~1 HEAD | grep "package.json" || true)
          
          if [ -z "$CHANGED_FILES" ]; then
            echo "No package.json changes detected"
            echo "packages=[]" >> $GITHUB_OUTPUT
            echo "has_releases=false" >> $GITHUB_OUTPUT
            exit 0
          fi
          
          PACKAGES="[]"
          
          for PKG_FILE in $CHANGED_FILES; do
            # Only process apps and packages directories
            if [[ "$PKG_FILE" == apps/* ]] || [[ "$PKG_FILE" == packages/* ]]; then
              DIR=$(dirname "$PKG_FILE")
              
              if [ -f "$PKG_FILE" ]; then
                NAME=$(node -p "require('./$PKG_FILE').name" 2>/dev/null || echo "")
                VERSION=$(node -p "require('./$PKG_FILE').version" 2>/dev/null || echo "")
                
                if [ -n "$NAME" ] && [ -n "$VERSION" ]; then
                  # Check if this package has a Dockerfile (apps only)
                  HAS_DOCKERFILE="false"
                  if [ -f "$DIR/Dockerfile" ]; then
                    HAS_DOCKERFILE="true"
                  fi
                  
                  ITEM=$(jq -n \
                    --arg name "$NAME" \
                    --arg version "$VERSION" \
                    --arg dir "$DIR" \
                    --arg dockerfile "$HAS_DOCKERFILE" \
                    '{name: $name, version: $version, dir: $dir, hasDockerfile: ($dockerfile == "true")}')
                  
                  PACKAGES=$(echo "$PACKAGES" | jq --argjson item "$ITEM" '. + [$item]')
                  echo "Detected: $NAME@$VERSION (dir: $DIR, dockerfile: $HAS_DOCKERFILE)"
                fi
              fi
            fi
          done
          
          # Filter to only packages with Dockerfiles for the docker publishing step
          DOCKER_PACKAGES=$(echo "$PACKAGES" | jq -c '[.[] | select(.hasDockerfile == true)]')
          
          # Use heredoc to safely output JSON (handles special characters)
          echo "packages<<EOF" >> $GITHUB_OUTPUT
          echo "$DOCKER_PACKAGES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
          
          if [ "$DOCKER_PACKAGES" != "[]" ]; then
            echo "has_releases=true" >> $GITHUB_OUTPUT
          else
            echo "has_releases=false" >> $GITHUB_OUTPUT
          fi
          
          echo "Final packages for Docker build:"
          echo "$DOCKER_PACKAGES" | jq .

  publish-docker:
    name: Publish Docker Images
    runs-on: blacksmith-4vcpu-ubuntu-2404
    needs: detect-releases
    if: needs.detect-releases.outputs.has_releases == 'true'
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        package: ${{ fromJson(needs.detect-releases.outputs.packages) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare Docker Metadata
        id: prep
        run: |
          PACKAGE_NAME="${{ matrix.package.name }}"
          # Remove scope if present (e.g. @uptimekit/dash -> dash)
          APP_NAME=${PACKAGE_NAME#@*/}
          APP_NAME=${APP_NAME#*/}
          
          # Construct image name
          IMAGE_NAME=${{ env.REGISTRY }}/${{ github.repository_owner }}/${APP_NAME}
          # Lowercase just in case
          IMAGE_NAME=$(echo "$IMAGE_NAME" | tr '[:upper:]' '[:lower:]')
          
          echo "image_name=$IMAGE_NAME" >> $GITHUB_OUTPUT
          echo "app_name_clean=$APP_NAME" >> $GITHUB_OUTPUT
          echo "app_dir=${{ matrix.package.dir }}" >> $GITHUB_OUTPUT

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ${{ steps.prep.outputs.image_name }}
            uptimekit/${{ steps.prep.outputs.app_name_clean }}
          tags: |
            type=semver,pattern={{version}},value=${{ matrix.package.version }}
            type=semver,pattern={{major}}.{{minor}},value=${{ matrix.package.version }}
            type=semver,pattern={{major}},value=${{ matrix.package.version }}
            type=raw,value=latest

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Setup Blacksmith Builder
        uses: useblacksmith/setup-docker-builder@v1

      - name: Docker Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Docker Image Publish
        uses: useblacksmith/build-push-action@v2
        with:
          context: .
          file: ${{ steps.prep.outputs.app_dir }}/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  create-git-tags:
    name: Create Git Tags
    runs-on: blacksmith-4vcpu-ubuntu-2404
    needs: [detect-releases, publish-docker]
    if: needs.detect-releases.outputs.has_releases == 'true'
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Configure Git
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'

      - name: Create Tags
        run: |
          PACKAGES='${{ needs.detect-releases.outputs.packages }}'
          
          echo "$PACKAGES" | jq -c '.[]' | while read -r pkg; do
            NAME=$(echo "$pkg" | jq -r '.name')
            VERSION=$(echo "$pkg" | jq -r '.version')
            
            # Create tag name (e.g., @uptimekit/dash@0.0.8 -> dash-v0.0.8)
            APP_NAME=${NAME#@*/}
            APP_NAME=${APP_NAME#*/}
            TAG_NAME="${APP_NAME}-v${VERSION}"
            
            echo "Creating tag: $TAG_NAME"
            
            # Check if tag already exists
            if git rev-parse "$TAG_NAME" >/dev/null 2>&1; then
              echo "Tag $TAG_NAME already exists, skipping..."
            else
              git tag -a "$TAG_NAME" -m "Release $NAME@$VERSION"
              git push origin "$TAG_NAME"
              echo "Created and pushed tag: $TAG_NAME"
            fi
          done

  sync-development:
    name: Sync Release to Development
    needs: detect-releases
    if: needs.detect-releases.outputs.has_releases == 'true'
    runs-on: blacksmith-4vcpu-ubuntu-2404
    permissions:
      contents: write
    steps:
      - name: Checkout Development
        uses: actions/checkout@v4
        with:
          ref: development
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Git Identity
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'

      - name: Merge Release into Development
        run: |
          git fetch origin release
          git merge origin/release --no-edit
          git push origin development
