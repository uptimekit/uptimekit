name: Version PR

on:
  pull_request:
    branches:
      - release
    types: [opened, synchronize, reopened, edited]

permissions:
  contents: write
  pull-requests: read

jobs:
  version-bump:
    name: Auto Version Bump
    runs-on: blacksmith-2vcpu-ubuntu-2404-arm
    # Only run if the PR is NOT created by github-actions (to avoid infinite loops)
    if: github.actor != 'github-actions[bot]'
    steps:
      - name: Checkout PR Branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: pnpm/action-setup@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install Dependencies
        run: pnpm install

      - name: Configure Git
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'

      - name: Detect Version Bump Type
        id: bump_type
        env:
          PR_BODY: ${{ github.event.pull_request.body }}
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: |
          # Check PR body and title for version markers
          COMBINED="$PR_TITLE $PR_BODY"
          
          if echo "$COMBINED" | grep -qi '\[ver:major\]'; then
            echo "type=major" >> $GITHUB_OUTPUT
            echo "Detected: MAJOR version bump"
          elif echo "$COMBINED" | grep -qi '\[ver:minor\]'; then
            echo "type=minor" >> $GITHUB_OUTPUT
            echo "Detected: MINOR version bump"
          else
            echo "type=patch" >> $GITHUB_OUTPUT
            echo "Detected: PATCH (hotfix) version bump"
          fi

      - name: Bump Versions
        id: bump
        env:
          BUMP_TYPE: ${{ steps.bump_type.outputs.type }}
          BASE_REF: ${{ github.event.pull_request.base.ref }}
        run: |
          # Run the version bump script
          node scripts/auto-version-bump.js
          
          # Check if there are any changes to commit
          if git diff --quiet; then
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "No version changes detected"
          else
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "Version changes detected, will commit"
          fi

      - name: Commit Version Changes
        if: steps.bump.outputs.changed == 'true'
        run: |
          git add -A
          git commit -m "chore: bump versions [${{ steps.bump_type.outputs.type }}]" || echo "Nothing to commit"
          git push origin ${{ github.event.pull_request.head.ref }}
