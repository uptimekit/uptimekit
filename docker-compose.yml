services:
  dash:
    build:
      context: .
      dockerfile: apps/dash/Dockerfile
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/uptimekit
      - BETTER_AUTH_SECRET=secret
      - BETTER_AUTH_URL=http://localhost:3000
      - NEXT_PUBLIC_SELFHOSTED=true
      - NEXT_PUBLIC_URL=http://localhost:3000
      - CLICKHOUSE_URL=http://clickhouse:8123
      - CLICKHOUSE_USER=clickhouse
      - CLICKHOUSE_PASSWORD=clickhouse
    depends_on:
      - db
    restart: always

  worker:
    build:
      context: .
      dockerfile: apps/worker/Dockerfile
    environment:
      - DASHBOARD_URL=http://dash:3000
      - WORKER_API_KEY=change_me_to_real_worker_key
    depends_on:
      - dash
    restart: always

  status-page:
    build:
      context: .
      dockerfile: apps/status-page/Dockerfile
    ports:
      - "3001:3001"
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/uptimekit
    depends_on:
      - db
    restart: always

  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: uptimekit
    volumes:
      - db_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    restart: always

  clickhouse:
    image: clickhouse/clickhouse-server:latest
    ports:
      - "8123:8123"
      - "9000:9000"
    volumes:
      - clickhouse_data:/var/lib/clickhouse
    user: "root"
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    restart: always

volumes:
  db_data:
  clickhouse_data:
