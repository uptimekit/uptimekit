services:
  dash:
    build:
      context: .
      dockerfile: apps/dash/Dockerfile
    ports:
      - "${DASH_PORT:-3000}:3000"
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/uptimekit
      - CLICKHOUSE_URL=http://clickhouse:8123
      - CLICKHOUSE_USER=default
      - CLICKHOUSE_PASSWORD=clickhouse
      - REDIS_URL=redis://redis:6379
    depends_on:
      - db
      - redis
    restart: always

  scheduler:
    build:
      context: .
      dockerfile: packages/scheduler/Dockerfile
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/uptimekit
      - CLICKHOUSE_URL=http://clickhouse:8123
      - CLICKHOUSE_USER=default
      - CLICKHOUSE_PASSWORD=clickhouse
      - REDIS_URL=redis://redis:6379
    depends_on:
      - db
      - redis
      - clickhouse
    restart: always

  status-page:
    build:
      context: .
      dockerfile: apps/status-page/Dockerfile
    ports:
      - "${STATUS_PAGE_PORT:-3001}:3001"
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/uptimekit
      - REDIS_URL=redis://redis:6379
    depends_on:
      - db
    restart: always

  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: uptimekit
    volumes:
      - db_data:/var/lib/postgresql/data
    restart: always

  redis:
    image: redis:8.0-alpine
    volumes:
      - redis_data:/data
    restart: always

  clickhouse:
    image: clickhouse/clickhouse-server:latest
    volumes:
      - clickhouse_data:/var/lib/clickhouse
    environment:
      CLICKHOUSE_DB: uptimekit
      CLICKHOUSE_USER: default
      CLICKHOUSE_PASSWORD: clickhouse
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: 1
    user: "root"
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    restart: always

volumes:
  db_data:
  clickhouse_data:
  redis_data:
